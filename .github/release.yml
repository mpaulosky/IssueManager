# GitHub Auto-Generated Release Notes Configuration
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
    authors:
      - dependabot
  categories:
    - title: "🎉 New Features"
      labels:
        - type:feature
        - enhancement
    - title: "🔧 Improvements & Chores"
      labels:
        - type:chore
        - refactor
    - title: "📚 Documentation"
      labels:
        - type:docs
        - documentation
    - title: "🐛 Bug Fixes"
      labels:
        - type:bug
        - bug
    - title: "🔬 Research & Spikes"
      labels:
        - type:spike
    - title: "🚀 Infrastructure & DevOps"
      labels:
        - priority:p0
